# =============================================
# Movie Night Decision Maker - Configuration
# =============================================

# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# OMDb API (replaces TMDB)
# Get your FREE key at: https://www.omdbapi.com/apikey.aspx
omdb.api.key=${OMDB_API_KEY}
omdb.api.base-url=https://www.omdbapi.com

# Logging
logging.level.com.movienight=DEBUG
logging.level.org.springframework.web=INFO
