<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Room — Movie Night</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="nav">
        <a class="nav-logo" href="index.html">🎬 Movie<span>Night</span></a>
        <a href="index.html" class="btn btn-secondary" style="width:auto; padding: 8px 18px; font-size:0.9rem;">← Back</a>
    </nav>

    <div class="page" style="padding-top: 100px;">

        <div class="card">
            <h2>🔗 JOIN A ROOM</h2>
            <p class="muted mt-8">Enter the code your friend shared with you.</p>
            <hr class="divider">

            <div id="error-msg" class="alert alert-error hidden"></div>

            <div class="form-group">
                <label for="roomCode">Room Code</label>
                <input type="text" id="roomCode" placeholder="e.g. ABC123"
                       maxlength="6"
                       style="text-transform:uppercase; letter-spacing:0.25em; font-size:1.3rem; text-align:center;"
                       oninput="this.value = this.value.toUpperCase()">
            </div>

            <div class="form-group">
                <label for="yourName">Your Name</label>
                <input type="text" id="yourName" placeholder="e.g. Jordan" maxlength="30">
            </div>

            <button class="btn btn-primary" id="joinBtn" onclick="joinRoom()">
                🎬 Join Room
            </button>
        </div>

    </div>

    <div class="toast" id="toast"></div>
    <script src="js/join-room.js"></script>
</body>
</html>
